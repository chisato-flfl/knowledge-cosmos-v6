<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knowledge Cosmos | 知識宇宙</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  background: #000a1a;
  overflow: hidden;
  font-family: 'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Meiryo', sans-serif;
  color: #fff;
}

#canvas {
  position: fixed;
  top: 0; left: 0;
  display: block;
}

/* ── Header ── */
#header {
  position: fixed;
  top: 24px; left: 28px;
  z-index: 20;
  pointer-events: none;
}
#header h1 {
  font-size: 18px;
  font-weight: 300;
  letter-spacing: 0.2em;
  color: rgba(160,200,255,0.85);
}
#header p {
  font-size: 10px;
  letter-spacing: 0.3em;
  color: rgba(100,150,220,0.5);
  margin-top: 3px;
}

/* ── Result message ── */
#message {
  position: fixed;
  top: 0; left: 0; right: 0;
  text-align: center;
  padding-top: 28px;
  font-size: 13px;
  letter-spacing: 0.06em;
  color: rgba(160,210,255,0.8);
  pointer-events: none;
  z-index: 20;
  opacity: 0;
  transition: opacity 0.6s;
}

/* ── Bottom UI ── */
#ui {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 20;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  padding: 20px 20px 28px;
  background: linear-gradient(transparent, rgba(0,10,26,0.92) 40%);
}

#ui-label {
  font-size: 12px;
  letter-spacing: 0.12em;
  color: rgba(130,170,230,0.6);
}

#input-row {
  display: flex;
  gap: 10px;
  width: 100%;
  max-width: 440px;
}

#worry-input {
  flex: 1;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(100,150,255,0.25);
  border-radius: 100px;
  padding: 11px 20px;
  color: #fff;
  font-size: 14px;
  outline: none;
  transition: border-color 0.3s, background 0.3s;
  font-family: inherit;
}
#worry-input::placeholder { color: rgba(255,255,255,0.25); }
#worry-input:focus {
  border-color: rgba(100,160,255,0.55);
  background: rgba(255,255,255,0.09);
}

#search-btn {
  background: rgba(80,130,255,0.18);
  border: 1px solid rgba(100,160,255,0.35);
  border-radius: 100px;
  padding: 11px 22px;
  color: rgba(150,200,255,0.85);
  font-size: 13px;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.25s;
  white-space: nowrap;
}
#search-btn:hover {
  background: rgba(80,130,255,0.3);
  border-color: rgba(100,160,255,0.6);
  color: #fff;
}

#chips {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
}
.chip {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 100px;
  padding: 5px 13px;
  color: rgba(180,210,255,0.5);
  font-size: 11px;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
}
.chip:hover {
  background: rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.9);
  border-color: rgba(255,255,255,0.3);
}
</style>
</head>
<body>

<div id="header">
  <h1>✦ Knowledge Cosmos</h1>
  <p>知 識 宇 宙</p>
</div>

<div id="message"></div>

<canvas id="canvas"></canvas>

<div id="ui">
  <p id="ui-label">✦ 今の悩みを入力して、知識宇宙に問いかける</p>
  <div id="input-row">
    <input id="worry-input" type="text" placeholder="例：転職、将来不安、人間関係…" />
    <button id="search-btn">探す</button>
  </div>
  <div id="chips">
    <button class="chip" onclick="doSearch('転職')">転職</button>
    <button class="chip" onclick="doSearch('将来不安')">将来不安</button>
    <button class="chip" onclick="doSearch('人間関係')">人間関係</button>
    <button class="chip" onclick="doSearch('AI時代の学び')">AI時代の学び</button>
    <button class="chip" onclick="doSearch('社会')">社会</button>
    <button class="chip" onclick="doSearch('')">リセット</button>
  </div>
</div>

<script>
// ================================================================
// DATA
// ================================================================
const BOOKS = [
  {
    id: 'sapiens',
    title: 'サピエンス全史',
    author: 'ユヴァル・ノア・ハラリ',
    keywords: ['歴史', '人類', '文明', '社会'],
    hex: '#7B68EE',
  },
  {
    id: 'jinsin',
    title: '人新世の資本論',
    author: '斎藤幸平',
    keywords: ['資本主義', '社会', '環境', '哲学'],
    hex: '#00CED1',
  },
  {
    id: 'lifeshift',
    title: 'LIFE SHIFT',
    author: 'リンダ・グラットン',
    keywords: ['人生', 'キャリア', '働き方', '自己理解'],
    hex: '#FF6B9D',
  },
  {
    id: 'kirawareru',
    title: '嫌われる勇気',
    author: '岸見一郎',
    keywords: ['自己理解', '心理学', '哲学', '人生'],
    hex: '#FFD700',
  },
];

// 悩み → 関連キーワード
const WORRY_MAP = {
  '転職':       ['キャリア', '働き方', '自己理解', '人生'],
  'キャリア':   ['キャリア', '働き方', '自己理解'],
  '仕事':       ['キャリア', '働き方', '自己理解'],
  '将来不安':   ['人生', 'キャリア', '自己理解', '資本主義', '哲学'],
  '将来':       ['人生', 'キャリア', '自己理解'],
  '不安':       ['人生', '自己理解', '心理学', '哲学'],
  '人間関係':   ['心理学', '哲学', '自己理解'],
  '人間':       ['心理学', '哲学', '自己理解', '人類'],
  '関係':       ['心理学', '哲学', '自己理解'],
  'ai時代の学び': ['社会', '資本主義', '人類', '文明', '環境'],
  'ai時代':     ['社会', '資本主義', '人類', '文明'],
  'ai':         ['社会', '資本主義', '文明'],
  '学び':       ['歴史', '文明', '人類', '社会'],
  '社会':       ['社会', '資本主義', '文明', '人類'],
  '環境':       ['環境', '資本主義', '社会'],
  '自分':       ['自己理解', '心理学', '人生'],
  '哲学':       ['哲学', '自己理解', '心理学'],
  '歴史':       ['歴史', '文明', '人類'],
};

// ================================================================
// HEX → RGB
// ================================================================
function hexRgb(hex) {
  return {
    r: parseInt(hex.slice(1,3), 16),
    g: parseInt(hex.slice(3,5), 16),
    b: parseInt(hex.slice(5,7), 16),
  };
}

// ================================================================
// CANVAS SETUP
// ================================================================
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', () => { resize(); initGraph(); });

// ================================================================
// STARS
// ================================================================
let stars = [];
function initStars() {
  stars = [];
  const count = Math.floor(W * H / 4000);
  for (let i = 0; i < count; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.2 + 0.2,
      base: Math.random() * 0.6 + 0.1,
      speed: Math.random() * 0.015 + 0.003,
      phase: Math.random() * Math.PI * 2,
    });
  }
}
initStars();

function drawStars(t) {
  stars.forEach(s => {
    const a = s.base + Math.sin(t * s.speed + s.phase) * 0.25;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200,220,255,${a})`;
    ctx.fill();
  });
}

// ================================================================
// NODE GRAPH
// ================================================================
let nodes = [], edges = [];

const BOOK_R  = 34;
const KW_R    = 13;

function initGraph() {
  nodes = [];
  edges = [];

  // 固有キーワード一覧
  const allKw = [...new Set(BOOKS.flatMap(b => b.keywords))];

  // 本ノードを菱形配置
  const cx = W / 2;
  const cy = H / 2 - 50;
  const rx = Math.min(W * 0.28, 200);
  const ry = Math.min(H * 0.20, 160);
  const angles = [-Math.PI/2, 0, Math.PI/2, Math.PI]; // 上右下左

  BOOKS.forEach((book, i) => {
    nodes.push({
      id: book.id,
      type: 'book',
      book,
      x: cx + Math.cos(angles[i]) * rx + (Math.random()-0.5)*20,
      y: cy + Math.sin(angles[i]) * ry + (Math.random()-0.5)*20,
      vx: 0, vy: 0,
      r: BOOK_R,
      hi: 0,      // highlight intensity 0-1
      hiTarget: 0,
      phase: Math.random() * Math.PI * 2,
    });
  });

  // キーワードノードを対応する本の近くに配置
  allKw.forEach(kw => {
    const related = BOOKS.filter(b => b.keywords.includes(kw));
    const refs = related.map(b => nodes.find(n => n.id === b.id));
    const ax = refs.reduce((s,n) => s + n.x, 0) / refs.length;
    const ay = refs.reduce((s,n) => s + n.y, 0) / refs.length;
    const a  = Math.random() * Math.PI * 2;
    const d  = 55 + Math.random() * 40;
    nodes.push({
      id: 'kw_' + kw,
      type: 'keyword',
      kw,
      books: related,
      x: ax + Math.cos(a) * d,
      y: ay + Math.sin(a) * d,
      vx: 0, vy: 0,
      r: KW_R,
      hi: 0,
      hiTarget: 0,
      phase: Math.random() * Math.PI * 2,
    });
  });

  // エッジ（本 ↔ キーワード）
  BOOKS.forEach(book => {
    const bn = nodes.find(n => n.id === book.id);
    book.keywords.forEach(kw => {
      const kn = nodes.find(n => n.id === 'kw_' + kw);
      if (bn && kn) edges.push({ a: bn, b: kn, hex: book.hex });
    });
  });

  // ウォームアップ
  for (let i = 0; i < 300; i++) simulate();
}

// ================================================================
// FORCE SIMULATION
// ================================================================
function simulate() {
  const REP  = 2800;
  const K    = 0.012;
  const REST = 110;
  const DAMP = 0.80;
  const GRAV = 0.002;
  const cx = W / 2, cy = H / 2 - 50;

  // 反発
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i+1; j < nodes.length; j++) {
      const dx = nodes[j].x - nodes[i].x;
      const dy = nodes[j].y - nodes[i].y;
      const d  = Math.hypot(dx, dy) + 0.01;
      const f  = REP / (d * d);
      const fx = dx/d * f, fy = dy/d * f;
      nodes[i].vx -= fx; nodes[i].vy -= fy;
      nodes[j].vx += fx; nodes[j].vy += fy;
    }
  }

  // スプリング（エッジ）
  edges.forEach(({ a, b }) => {
    const dx = b.x - a.x, dy = b.y - a.y;
    const d  = Math.hypot(dx, dy) + 0.01;
    const f  = (d - REST) * K;
    const fx = dx/d * f, fy = dy/d * f;
    a.vx += fx; a.vy += fy;
    b.vx -= fx; b.vy -= fy;
  });

  // 重力（中心引力）
  nodes.forEach(n => {
    n.vx += (cx - n.x) * GRAV;
    n.vy += (cy - n.y) * GRAV;
    n.vx *= DAMP;
    n.vy *= DAMP;
    n.x  += n.vx;
    n.y  += n.vy;
    // 境界
    const m = 60;
    n.x = Math.max(m, Math.min(W - m, n.x));
    n.y = Math.max(m, Math.min(H - 160, n.y));
  });
}

// ================================================================
// DRAWING
// ================================================================
function drawEdge(e, t) {
  const { a, b, hex } = e;
  const hiMax = Math.max(a.hi, b.hi);
  const { r, g, bl } = (() => { const v = hexRgb(hex); return {r:v.r,g:v.g,bl:v.b}; })();

  let alpha, width;
  if (hiMax > 0.05) {
    const pulse = 0.75 + 0.25 * Math.sin(t * 0.06);
    alpha = 0.15 + 0.65 * hiMax * pulse;
    width = 1 + 1.5 * hiMax;
  } else {
    alpha = 0.10;
    width = 0.7;
  }

  ctx.beginPath();
  ctx.moveTo(a.x, a.y);
  ctx.lineTo(b.x, b.y);
  ctx.strokeStyle = `rgba(${r},${g},${bl},${alpha})`;
  ctx.lineWidth   = width;
  ctx.stroke();
}

function drawBookNode(n, t) {
  const { x, y, r, book, hi, phase } = n;
  const { r:cr, g:cg, b:cb } = hexRgb(book.hex);
  const pulse = Math.sin(t * 0.022 + phase) * 0.5 + 0.5;

  // ハイライト時：外側グロー + 波紋
  if (hi > 0.05) {
    const glowR = r * (2.8 + 0.7 * pulse) * hi;
    const grd = ctx.createRadialGradient(x, y, r*0.5, x, y, glowR);
    grd.addColorStop(0, `rgba(${cr},${cg},${cb},${0.45 * hi})`);
    grd.addColorStop(1, `rgba(${cr},${cg},${cb},0)`);
    ctx.beginPath(); ctx.arc(x, y, glowR, 0, Math.PI*2);
    ctx.fillStyle = grd; ctx.fill();

    // 波紋
    const ringR = r + 12 + pulse * 22 * hi;
    ctx.beginPath(); ctx.arc(x, y, ringR, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(${cr},${cg},${cb},${0.4 * (1 - pulse) * hi})`;
    ctx.lineWidth = 2; ctx.stroke();
  }

  // 常時アンビエントグロー
  const ag = r * (1.6 + 0.2 * pulse);
  const agrd = ctx.createRadialGradient(x, y, 0, x, y, ag);
  agrd.addColorStop(0, `rgba(${cr},${cg},${cb},${0.12 + 0.15 * hi})`);
  agrd.addColorStop(1, `rgba(${cr},${cg},${cb},0)`);
  ctx.beginPath(); ctx.arc(x, y, ag, 0, Math.PI*2);
  ctx.fillStyle = agrd; ctx.fill();

  // 本体
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2);
  ctx.fillStyle   = `rgba(${cr},${cg},${cb},${0.55 + 0.35 * hi})`;
  ctx.fill();
  ctx.strokeStyle = `rgba(${cr},${cg},${cb},0.85)`;
  ctx.lineWidth   = hi > 0.05 ? 2 : 1;
  ctx.stroke();

  // テキスト
  ctx.fillStyle    = `rgba(255,255,255,${0.85 + 0.15 * hi})`;
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  const title = book.title;
  const maxW  = r * 1.7;

  // 日本語タイトルを2行に分割
  ctx.font = `bold 11px 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif`;
  if (ctx.measureText(title).width > maxW) {
    const mid = Math.ceil(title.length / 2);
    ctx.fillText(title.slice(0, mid), x, y - 7);
    ctx.fillText(title.slice(mid),    x, y + 7);
  } else {
    ctx.fillText(title, x, y);
  }
}

function drawKeywordNode(n, t) {
  const { x, y, r, kw, books, hi, phase } = n;
  const pulse = Math.sin(t * 0.028 + phase) * 0.5 + 0.5;

  // 共有キーワードかどうかで色決定
  let cr, cg, cb;
  if (books.length > 1) {
    // ブレンド
    cr = Math.round(books.reduce((s,b) => s + hexRgb(b.hex).r, 0) / books.length);
    cg = Math.round(books.reduce((s,b) => s + hexRgb(b.hex).g, 0) / books.length);
    cb = Math.round(books.reduce((s,b) => s + hexRgb(b.hex).b, 0) / books.length);
  } else {
    const v = hexRgb(books[0].hex);
    cr = v.r; cg = v.g; cb = v.b;
  }

  // ハイライトグロー
  if (hi > 0.05) {
    const glowR = r * (3.5 + pulse) * hi;
    const grd = ctx.createRadialGradient(x, y, 0, x, y, glowR);
    grd.addColorStop(0, `rgba(${cr},${cg},${cb},${0.55 * hi})`);
    grd.addColorStop(1, `rgba(${cr},${cg},${cb},0)`);
    ctx.beginPath(); ctx.arc(x, y, glowR, 0, Math.PI*2);
    ctx.fillStyle = grd; ctx.fill();
  }

  // 本体
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2);
  if (hi > 0.05) {
    ctx.fillStyle   = `rgba(${cr},${cg},${cb},${0.75 * hi + 0.05})`;
    ctx.strokeStyle = `rgba(255,255,255,${0.7 + 0.3 * hi})`;
  } else {
    ctx.fillStyle   = 'rgba(160,200,255,0.06)';
    ctx.strokeStyle = 'rgba(160,200,255,0.22)';
  }
  ctx.fill();
  ctx.lineWidth = 1; ctx.stroke();

  // ラベル
  const labelA = hi > 0.05 ? (0.5 + 0.5 * hi) : 0.45;
  ctx.fillStyle    = `rgba(180,215,255,${labelA})`;
  ctx.font         = hi > 0.05
    ? `bold 10px 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif`
    : `10px 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif`;
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText(kw, x, y + r + 3);
}

// ================================================================
// SEARCH LOGIC
// ================================================================
function doSearch(query) {
  document.getElementById('worry-input').value = query;
  const q = query.trim().toLowerCase();

  if (!q) {
    // リセット
    nodes.forEach(n => { n.hiTarget = 0; });
    showMessage('');
    return;
  }

  const hit = new Set();

  // キーワード直接マッチ
  nodes.filter(n => n.type === 'keyword').forEach(n => {
    if (q.includes(n.kw) || n.kw.includes(q)) hit.add(n.kw);
  });

  // 本タイトルマッチ → その本のキーワード全部
  BOOKS.forEach(b => {
    if (q.includes(b.title) || b.title.toLowerCase().includes(q) || b.id.includes(q)) {
      b.keywords.forEach(kw => hit.add(kw));
    }
  });

  // 悩みマップ
  Object.entries(WORRY_MAP).forEach(([worry, kws]) => {
    if (q.includes(worry) || worry.includes(q)) {
      kws.forEach(kw => hit.add(kw));
    }
  });

  // ハイライト適用
  nodes.forEach(n => {
    if (n.type === 'keyword') {
      n.hiTarget = hit.has(n.kw) ? 1 : 0;
    }
    if (n.type === 'book') {
      const match = n.book.keywords.some(kw => hit.has(kw));
      n.hiTarget = match ? 1 : 0;
    }
  });

  // メッセージ
  const hitBooks = nodes.filter(n => n.type === 'book' && n.hiTarget > 0).map(n => n.book.title);
  if (hitBooks.length > 0) {
    showMessage(`「${query}」に響く本 → ${hitBooks.join('　·　')}`);
  } else {
    showMessage(`「${query}」に関連する本が見つかりませんでした`);
  }
}

function showMessage(msg) {
  const el = document.getElementById('message');
  el.textContent = msg;
  el.style.opacity = msg ? '1' : '0';
}

document.getElementById('search-btn').addEventListener('click', () => {
  doSearch(document.getElementById('worry-input').value);
});
document.getElementById('worry-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch(e.target.value);
});

// ================================================================
// ANIMATION LOOP
// ================================================================
let frame = 0;

function drawBackground() {
  ctx.fillStyle = '#000a1a';
  ctx.fillRect(0, 0, W, H);

  // 中心ネビュラ
  const cx = W/2, cy = H/2 - 50;
  const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.min(W,H) * 0.5);
  grd.addColorStop(0, 'rgba(10,25,70,0.35)');
  grd.addColorStop(0.6, 'rgba(5,15,45,0.15)');
  grd.addColorStop(1,   'rgba(0,10,26,0)');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);
}

function loop() {
  requestAnimationFrame(loop);
  frame++;

  drawBackground();
  drawStars(frame);
  simulate();

  // ハイライト強度をなめらかに補間
  nodes.forEach(n => {
    n.hi = n.hi * 0.90 + (n.hiTarget || 0) * 0.10;
  });

  // エッジ描画
  edges.forEach(e => drawEdge(e, frame));

  // キーワードノード
  nodes.filter(n => n.type === 'keyword').forEach(n => drawKeywordNode(n, frame));

  // 本ノード（前面）
  nodes.filter(n => n.type === 'book').forEach(n => drawBookNode(n, frame));
}

// ================================================================
// START
// ================================================================
initGraph();
loop();
</script>
</body>
</html>
